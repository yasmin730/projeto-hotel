<html lang="pt-br">

<!-- =============================================================================
🏨 HOTEL CARIBE AZUL - PÁGINA DE ALTERAÇÃO DE DADOS
💡 Objetivo: permitir editar informações de um cliente já cadastrado.
📘 O sistema busca os dados via ID, preenche o formulário automaticamente
    e envia as alterações ao backend Flask, que atualiza o Excel (.xlsx).
🎓 Didático: feito para alunos compreenderem a integração HTML + JS + Flask.
============================================================================= -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Dados do Cliente</title>

    <!-- 🎨 Bootstrap (estilos prontos e responsivos) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🎨 CSS personalizado do projeto -->
    <link rel="stylesheet" href="../static/css/style.css">
</head>


<div>
    <h2> Alterar Dados do Cliente</h2>

    <form type="hidden" id="clienteId">

        <div>

            <div>
                <label>Nome:</label>
                <input type="text" id="nome" required>
            </div>

            <div>
                <label>CPF:</label>
                <input type="text" id="cpf" required>
            </div>

            <div>
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>

            <div>
                <label>Endereço:</label>
                <input type="text" id="endereco" required>
            </div>

            <div>
                <label>Observações:</label>
                <textarea id="observacoes">s</textarea>
            </div>
        </div>

        <div>
            <button type="submit"> Salvar Alterações</button>
        </div>
    </form>
    <div id="mensagem"></div>
</div>

<body>

    <!-- =============================================================================
    🔹 MENU SUPERIOR (NAVBAR)
    -----------------------------------------------------------------------------
    💡 Permite navegar entre as rotas Flask:
       ➜ "/" (Cadastro)
       ➜ "/consulta" (Consulta)
    ============================================================================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-white" href="/">🏨 Hotel Caribe Azul</a>

            <!-- 📱 Botão do menu para telas pequenas -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- 🧭 Itens do menu -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/">🏠 Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/consulta">🔍 Consultar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
