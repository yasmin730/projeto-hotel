<!DOCTYPE html>                    <!--DIZ AO COMPILADOR QUE É UM ARQUIVO HTML5-->
<html lang="pt-br">                
<head>                             
    <meta charset="UTF-8">         
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!--RESPONSABILIDADE DO SITE-->
    <title>cadastro de clientes</title>
    
</head>
<body>

    <nav>
        <div>
          <!-- Logotipo / Nome de hotel -->
           <a href="/"> Hotel Villa Vistosa</a>
           <!-- Botão que aparece em telas pequenas-->
            <button type="button">
                <span></span>
             </button>
             <!-- Intens de navegação-->
              <div id="navbarNav">
                <ul>
                    <li>

                        <a href="/"> 🏠 Cadrastro </a>
                    </li>
                    <li>

                        <a href="/colsulta">🔍 Consultar</a>
                    </li>
                </ul>
              </div>
        </div>
    </nav>
   <form id="cadastro">
    <div>
        <div>
            <label> nome: </label>
            <input type="text" name="nome" required>
        </div>
    </div>
    <div>
        <div>
            <label> CPF: </label>
            <input type="text" name="cpf" required>
        </div>
    </div>
    <div>
        <div>
            <label> email: </label>
            <input type="email" name="email" required>
        </div>
    </div>
    <div>
        <div>
            <label> telefone: </label>
            <input type="text" name="telefone" required>
        </div>
    </div>
    <div>
        <div>
            <label> endereço: </label>
            <input type="text" name="endereço" required>
        </div>
    </div>
    <div>
        <div>
            <label> observação: </label>
            <input type="text" name="observação" required>
        </div>
    </div>


    <button type="submit">Cadastrar</button>
   </form>
</body>
</html>
